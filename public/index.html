<!DOCTYPE html>
<html>
<head>
  <title>Tomar Ji App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="center glass">
  <h1>🔥 Tomar Ji Screen Share</h1>

  <input id="nameInput" placeholder="Enter Your Name">

  <br><br>

  <button onclick="createRoom()">🆕 Create Room</button>

  <br><br>

  <input id="roomInput" placeholder="Enter Room ID">
  <button onclick="joinRoom()">🔗 Join Room</button>
</div>

<script>
function createRoom() {
  const name = document.getElementById("nameInput").value;
  if (!name) return alert("Enter name");

  localStorage.setItem("username", name);

  const roomId = Math.random().toString(36).substring(2, 8);
  window.location.href = "/room.html?room=" + roomId;
}

function joinRoom() {
  const name = document.getElementById("nameInput").value;
  const room = document.getElementById("roomInput").value;

  if (!name || !room) return alert("Enter all details");

  localStorage.setItem("username", name);

  window.location.href = "/room.html?room=" + room;
}
</script>

</body>
</html>
